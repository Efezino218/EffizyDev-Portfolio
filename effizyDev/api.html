    <!DOCTYPE html>
<html>
<head>
    <title>Flight Search</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<h1>Flight Search</h1>
<form id="searchForm">
    <label for="from">From:</label>
    <input type="text" id="from" name="from"><br><br>
    
    <label for="to">To:</label>
    <input type="text" id="to" name="to"><br><br>
    
    <label for="departureDate">Departure Date:</label>
    <input type="date" id="departureDate" name="departureDate"><br><br>
    
    <button type="button" id="searchButton">Search Flights</button>
</form>

<h2>Flight Search Results</h2>
<div id="results"></div>

<script>
$(document).ready(function() {
    $("#searchButton").click(function() {
        // API endpoint URL
        var apiUrl = "https://book-flyaero.crane.aero/web/FlightSearchAPI?language=en";
        
        // Get user input
        var from = $("#from").val();
        var to = $("#to").val();
        var departureDate = $("#departureDate").val();
        
        // Build API URL with user input
        var searchUrl = apiUrl + "&from=" + from + "&to=" + to + "&departureDate=" + departureDate;
        
        // Make a GET request to the API
        $.get(searchUrl, function(data) {
            // Assuming the response is JSON data
            // You can parse and format the data as needed
            
            // Display the results in the "results" div
            $("#results").html(JSON.stringify(data, null, 2));
        })
        .fail(function() {
            // Handle any errors here
            $("#results").text("Error fetching data from the API.");
        });
    });
});
</script>

</body>
</html>
